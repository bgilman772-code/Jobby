<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Quick Apply — {{ job.get('title','') }}</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
             margin: 0; background: #f0f2f5; color: #222; }
      .topbar { background: #1a3a6a; color: white; padding: 0.75rem 1.5rem;
                display: flex; align-items: center; gap: 1rem; }
      .topbar h1 { margin: 0; font-size: 1.1rem; flex: 1; }
      .topbar a  { color: #aac8f0; text-decoration: none; font-size: 0.9rem; }

      .container { max-width: 620px; margin: 2.5rem auto; padding: 0 1rem; }

      .card { background: white; border-radius: 10px; padding: 2rem 2rem 1.5rem;
              box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

      .job-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 0.2rem; }
      .job-company { font-size: 0.9rem; color: #555; margin: 0 0 1.5rem; }

      /* Status area */
      .status-wrap { display: flex; align-items: center; gap: 1rem;
                     padding: 1rem 1.2rem; border-radius: 8px;
                     border: 2px solid #e0e0e0; margin-bottom: 1.2rem;
                     background: #fafafa; }
      .status-wrap.s-starting,
      .status-wrap.s-navigating { border-color: #1a5c9a; background: #eef4ff; }
      .status-wrap.s-filling    { border-color: #7c3aed; background: #f5f0ff; }
      .status-wrap.s-submitted  { border-color: #1a7a1a; background: #edf7ed; }
      .status-wrap.s-error      { border-color: #c00;    background: #fce8e8; }
      .status-wrap.s-cancelled  { border-color: #999;    background: #f5f5f5; }

      /* Spinner */
      .spin-ring {
        width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
        border: 4px solid #e0e0e0; border-top-color: #1a5c9a;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin-ring.done { animation: none; border-color: #1a7a1a; border-top-color: #1a7a1a; }
      .spin-ring.err  { animation: none; border-color: #c00; border-top-color: #c00; }

      .status-text { flex: 1; }
      .status-label { font-weight: 700; font-size: 0.95rem; }
      .status-msg   { font-size: 0.82rem; color: #666; margin-top: 0.2rem; }

      /* Fields filled */
      .fields-box { font-size: 0.82rem; color: #555; margin-bottom: 1.2rem; }
      .fields-box ul { margin: 0.3rem 0 0 0; padding-left: 1.3rem; }
      .fields-box li { margin-bottom: 0.15rem; }

      /* CTA after done */
      .done-actions { display: none; flex-direction: column; gap: 0.6rem; margin-top: 1rem; }
      .btn-primary {
        display: inline-block; padding: 0.7rem 1.4rem;
        background: #1a3a6a; color: white; border-radius: 6px;
        text-decoration: none; font-weight: 600; font-size: 0.95rem;
        text-align: center;
      }
      .btn-secondary {
        display: inline-block; padding: 0.7rem 1.4rem;
        background: white; color: #1a3a6a; border-radius: 6px;
        text-decoration: none; font-weight: 600; font-size: 0.95rem;
        border: 1px solid #1a3a6a; text-align: center;
      }
      .note { font-size: 0.8rem; color: #888; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Quick Apply</h1>
      <a href="/saved-jobs">My Applications</a>
      <a href="/">Home</a>
    </div>

    <div class="container">
      <div class="card">
        <div class="job-title">{{ job.get('title','') }}</div>
        <div class="job-company">{{ job.get('company_name') or job.get('company','') }}</div>

        <div class="status-wrap" id="status-wrap">
          <div class="spin-ring" id="spinner"></div>
          <div class="status-text">
            <div class="status-label" id="status-label">Starting...</div>
            <div class="status-msg"   id="status-msg">Launching headless browser</div>
          </div>
        </div>

        <div class="fields-box" id="fields-box" style="display:none">
          <strong>Fields filled:</strong>
          <ul id="fields-list"></ul>
        </div>

        <div class="done-actions" id="done-actions">
          <a href="/saved-jobs" class="btn-primary">View My Applications</a>
          <a href="/match-results/{{ cache_key }}" class="btn-secondary">Back to Job List</a>
        </div>

        <p class="note" id="note">
          The browser is working in the background — you don't need to do anything.
        </p>
      </div>
    </div>

    <script>
      const APP_ID     = "{{ app_id }}";
      const CACHE_KEY  = "{{ cache_key }}";

      const LABELS = {
        starting:    'Starting up...',
        navigating:  'Navigating to job page...',
        filling:     'Filling in your details...',
        submitted:   'Application submitted!',
        error:       'Something went wrong',
        cancelled:   'Cancelled',
        not_found:   'Session not found',
      };

      function poll() {
        fetch(`/apply-status/${APP_ID}`)
          .then(r => r.json())
          .then(data => {
            const st = data.status || 'starting';
            const wrap    = document.getElementById('status-wrap');
            const spinner = document.getElementById('spinner');
            const label   = document.getElementById('status-label');
            const msg     = document.getElementById('status-msg');
            const fieldsBox = document.getElementById('fields-box');
            const fieldsList = document.getElementById('fields-list');
            const doneActions = document.getElementById('done-actions');
            const note = document.getElementById('note');

            label.textContent = LABELS[st] || st;
            msg.textContent   = data.message || '';

            // Update class
            wrap.className = 'status-wrap s-' + st;

            // Filled fields
            const fields = data.filled_fields || [];
            if (fields.length) {
              fieldsBox.style.display = 'block';
              fieldsList.innerHTML = '';
              fields.forEach(f => {
                const li = document.createElement('li');
                li.textContent = f;
                fieldsList.appendChild(li);
              });
            }

            const terminal = ['submitted', 'error', 'cancelled', 'not_found'];
            if (terminal.includes(st)) {
              spinner.className = 'spin-ring ' + (st === 'submitted' ? 'done' : 'err');
              doneActions.style.display = 'flex';
              if (st === 'submitted') {
                note.textContent = 'Application submitted and saved to your tracker.';
              } else if (st === 'error') {
                note.textContent = 'Error: ' + (data.error || 'Unknown error. Try applying manually.');
              } else {
                note.textContent = '';
              }
            } else {
              setTimeout(poll, 2000);
            }
          })
          .catch(() => setTimeout(poll, 3000));
      }

      setTimeout(poll, 1500);
    </script>
  </body>
</html>
